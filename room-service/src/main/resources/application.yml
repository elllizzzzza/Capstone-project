server:
  port: 8084

spring:
  application:
    name: room-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/room_db
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    instance:
      prefer-ip-address: true