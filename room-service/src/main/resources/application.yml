server:
  port: 8084

spring:
  application:
    name: room-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/room_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  logging:
    level:
      org.springframework.cloud.loadbalancer: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    instance:
      prefer-ip-address: true