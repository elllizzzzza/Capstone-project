global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8081']

  - job_name: 'course-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['course-service:8082']

  - job_name: 'library-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['library-service:8083']

  - job_name: 'room-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'room-service:8084' ]
