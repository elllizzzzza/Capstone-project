server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/user_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: "your-256-bit-secret-your-256-bit-secret"
  expiration: 86400000  # 24 hours

logging:
  level:
    root: WARN
    com.educationalSystem: INFO


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    instance:
      prefer-ip-address: true