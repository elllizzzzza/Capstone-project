server:
  port: 8083

spring:
  application:
    name: library-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/library_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  logging:
    level:
      org.springframework.cloud.loadbalancer: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    instance:
      prefer-ip-address: true

app:
  book:
    categories: Fiction-NonFiction-Science-History-Technology-Art-Mathematics

jwt:
  secret: "your-256-bit-secret-your-256-bit-secret"
  expiration: 86400000  # 24 hours